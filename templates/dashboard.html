<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaBot Dashboard 🇪🇨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .messages-container {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-user {
            background: #e6f3ff;
            border-left: 4px solid #667eea;
        }
        
        .message-bot {
            background: #f0f9ff;
            border-left: 4px solid #48bb78;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .message-sender {
            font-weight: 600;
            color: #667eea;
        }
        
        .message-time {
            font-size: 12px;
            color: #999;
        }
        
        .message-phone {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .message-content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
        
        .refresh-btn {
            animation: rotate 2s linear infinite;
            display: inline-block;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇪🇨 ContaBot Dashboard</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="totalConversations">0</div>
                    <div class="stat-label">Conversaciones</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalMessages">0</div>
                    <div class="stat-label">Mensajes</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="aiProvider">-</div>
                    <div class="stat-label">IA</div>
                </div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Panel de Mensajes -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">💬 Mensajes en Tiempo Real</h2>
                    <button class="btn btn-primary" onclick="refreshMessages()">
                        <span id="refreshIcon">🔄</span> Actualizar
                    </button>
                </div>
                <div id="messagesContainer" class="messages-container">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No hay mensajes aún</p>
                    </div>
                </div>
            </div>
            
            <!-- Panel de Configuración del Prompt -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">⚙️ Configurar System Prompt</h2>
                    <button class="btn btn-success" onclick="savePrompt()">💾 Guardar Cambios</button>
                </div>
                <div id="alertContainer"></div>
                <textarea id="promptEditor" placeholder="Cargando prompt..."></textarea>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="loadPrompt()">🔄 Recargar</button>
                    <button class="btn btn-danger" onclick="resetPrompt()">↩️ Restaurar Original</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-refresh cada 3 segundos
        let autoRefresh = setInterval(refreshMessages, 3000);
        
        // Cargar datos iniciales
        window.onload = function() {
            refreshMessages();
            loadPrompt();
        };
        
        async function refreshMessages() {
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                
                // Actualizar estadísticas
                document.getElementById('totalConversations').textContent = data.stats.active_conversations;
                document.getElementById('totalMessages').textContent = data.stats.total_messages;
                document.getElementById('aiProvider').textContent = data.ai_provider.toUpperCase();
                
                // Actualizar mensajes
                const container = document.getElementById('messagesContainer');
                
                if (data.messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No hay mensajes aún</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = data.messages.map(msg => `
                        <div class="message message-${msg.role}">
                            <div class="message-header">
                                <span class="message-sender">${msg.role === 'user' ? '👤 Usuario' : '🤖 Bot'}</span>
                                <span class="message-time">${msg.timestamp}</span>
                            </div>
                            ${msg.phone ? `<div class="message-phone">📱 ${msg.phone}</div>` : ''}
                            <div class="message-content">${msg.content}</div>
                        </div>
                    `).join('');
                    
                    // Scroll al último mensaje
                    container.scrollTop = container.scrollHeight;
                }
            } catch (error) {
                console.error('Error al cargar mensajes:', error);
            }
        }
        
        async function loadPrompt() {
            try {
                const response = await fetch('/api/prompt');
                const data = await response.json();
                document.getElementById('promptEditor').value = data.prompt;
            } catch (error) {
                showAlert('Error al cargar el prompt', 'error');
            }
        }
        
        async function savePrompt() {
            const prompt = document.getElementById('promptEditor').value;
            
            try {
                const response = await fetch('/api/prompt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('✅ Prompt guardado correctamente. El bot se reiniciará automáticamente.', 'success');
                } else {
                    showAlert('❌ Error al guardar el prompt', 'error');
                }
            } catch (error) {
                showAlert('❌ Error al guardar el prompt', 'error');
            }
        }
        
        async function resetPrompt() {
            if (!confirm('¿Estás seguro de restaurar el prompt original?')) return;
            
            try {
                const response = await fetch('/api/prompt/reset', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('✅ Prompt restaurado correctamente', 'success');
                    loadPrompt();
                } else {
                    showAlert('❌ Error al restaurar el prompt', 'error');
                }
            } catch (error) {
                showAlert('❌ Error al restaurar el prompt', 'error');
            }
        }
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            container.firstChild.style.display = 'block';
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
